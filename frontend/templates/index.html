<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Vision</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=2">
</head>

<body>
    <div id="introOverlay" class="intro-overlay">
        <div class="intro-backdrop"></div>
        <div class="intro-content">
            <button id="introStartBtn" class="intro-start-btn" type="button">
                시작
            </button>
        </div>
    </div>

    <main id="mainUi" class="main-ui is-hidden">
    <header class="navbar">
        <div class="logo">📸 Object Vision</div>

        <nav>
            <a href="/">홈</a>
            <a href="/board">게시판</a>
        </nav>
    </header>


    <section class="hero">
        <h1>
            AI 이미지 객체 분류 서비스
        </h1>

        <p>
            이미지를 업로드하면 객체를 분석하고
            결과를 게시판에 공유할 수 있어요.
        </p>
    </section>


    <section class="upload-box card">
        <h2>이미지 업로드</h2>

        <form id="predictForm">
            <label class="upload-area">
                <input type="file" id="imageInput" accept="image/*">
                <span>
                    이미지 선택 또는 드래그
                </span>
            </label>

            <button type="submit">
                분류 시작
            </button>
        </form>
    </section>


    <section id="previewSection" class="card">
        <img id="preview">
    </section>


    <section id="resultBox" class="card">
        <h2>예측 결과</h2>

        <div class="result-row">
            <span>클래스</span>
            <strong id="predictedClass"></strong>
        </div>

        <div class="result-row">
            <span>신뢰도</span>
            <strong id="confidence"></strong>
        </div>

        <ul id="topK"></ul>

        <button id="savePostBtn">
            게시글로 저장
        </button>
    </section>

    </main>
    <script src="{{ url_for('static', path='js/predict.js') }}?v=2"></script>

</body>

</html>
