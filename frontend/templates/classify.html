<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL 알파벳 분류</title>
    <link rel="stylesheet" href="/static/css/style.css?v=17">
</head>

<body>
    <main>
        <header class="navbar">
            <a class="brand" href="/">
                <span class="brand-mark">ASL</span>
                <span>ASL Letter Board</span>
            </a>

            <nav>
                <a href="/">홈</a>
                <a href="/classify" aria-current="page">분류</a>
                <a href="/love-learning">단어 학습</a>
                <a href="/board">게시판</a>
            </nav>
        </header>

        <section class="page-heading">
            <p class="eyebrow">ASL A-Z Classification</p>
            <h1>ASL 알파벳 이미지를 분류하세요</h1>
            <p>A부터 Z까지의 영어 수화 이미지를 업로드하거나 웹캠으로 촬영해 어떤 알파벳에 가까운지 간단히 구분합니다.</p>
        </section>

        <section class="predict-layout">
            <section class="upload-box card">
                <div class="section-title">
                    <h2>수화 이미지 입력</h2>
                    <span>JPG, PNG · 최대 10MB</span>
                </div>

                <form id="predictForm">
                    <label class="upload-area">
                        <input type="file" id="imageInput" accept="image/*">
                        <video id="cameraPreview" autoplay playsinline muted hidden></video>
                        <img id="preview" alt="">
                        <span id="uploadHint">ASL A-Z 이미지 선택 또는 드래그</span>
                    </label>

                    <div class="webcam-controls">
                        <button id="startCameraBtn" class="secondary-btn" type="button">웹캠 시작</button>
                        <button id="captureBtn" type="button" hidden>촬영 후 분석</button>
                    </div>

                    <button type="submit">알파벳 분류</button>
                </form>
            </section>

            <section id="resultBox" class="card result-card">
                <div class="section-title">
                    <h2>구분 결과</h2>
                    <span>Top 5</span>
                </div>

                <div class="result-summary">
                    <span id="predictedClass"></span>
                    <strong id="confidence"></strong>
                </div>

                <ul id="topK" class="score-list"></ul>

                <button id="savePostBtn" type="button">학습 기록으로 저장</button>
            </section>
        </section>
    </main>

    <script src="/static/js/predict.js?v=17"></script>
</body>

</html>
