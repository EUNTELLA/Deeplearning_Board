<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL A-I 학습 기록</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=13">
</head>

<body>
    <header class="navbar">
        <a class="brand" href="/">

            <a href="/classify">분류</a>

    </header>

    <section class="page-heading compact">
        <p class="eyebrow">Learning Archive</p>
        <h1>ASL A-I 학습 기록</h1>
