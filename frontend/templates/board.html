<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분류 게시판</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=11">
</head>

<body>
    <header class="navbar">
        <a class="brand" href="/">
            <span class="brand-mark">OV</span>
            <span>Object Vision</span>
        </a>

        <nav>
            <a href="/">홈</a>
            <a href="/classify">분류</a>
            <a href="/board" aria-current="page">게시판</a>
        </nav>
    </header>

    <section class="page-heading compact">
        <p class="eyebrow">Prediction Archive</p>
        <h1>분류 게시판</h1>
        <p>저장한 예측 결과를 조회하고 상세 페이지에서 제목 수정과 삭제를 할 수 있습니다.</p>
    </section>

    <section class="toolbar">
        <a class="button-link" href="/classify">새 분류 저장</a>
        <label class="select-field">
            <span>클래스 필터</span>
            <select id="categoryFilter">
                <option value="">전체</option>
            </select>
        </label>
    </section>

    <section id="postList" class="post-grid">
        <button id="loadMoreBtn" type="button">더 보기</button>
    </section>

    <script src="{{ url_for('static', path='js/board.js') }}?v=11"></script>
</body>

</html>
