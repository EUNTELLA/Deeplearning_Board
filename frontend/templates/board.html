<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분류 게시판</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=10">
</head>

<body>
    <header class="navbar">
        <a class="brand" href="/">
            <span class="brand-mark">OV</span>
            <span>Object Vision</span>
        </a>

        <nav>
            <a href="/">분류</a>
            <a href="/board">게시판</a>
        </nav>
    </header>

    <section class="page-heading compact">
        <p class="eyebrow">Prediction Archive</p>
        <h1>수화 학습</h1>
        <p>저장한 이미지 예측 결과를 한눈에 확인하세요.</p>
    </section>

    <section class="toolbar">
        <label class="select-field">
            <span>클래스 필터</span>
            <select id="categoryFilter">
                <option value="">전체</option>
            </select>
        </label>
    </section>

    <section id="postList" class="post-grid">
        <button id="loadMoreBtn" type="button">더 보기</button>
    </section>

    <script src="{{ url_for('static', path='js/board.js') }}?v=10"></script>
</body>

</html>
