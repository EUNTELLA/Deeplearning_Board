<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL 학습 기록 상세</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=14">
</head>

<body>
    <header class="navbar">
        <a class="brand" href="/">
            <span class="brand-mark">ASL</span>
            <span>ASL Letter Board</span>
        </a>

        <nav>
            <a href="/">홈</a>
            <a href="/classify">분류</a>
            <a href="/board" aria-current="page">게시판</a>
        </nav>
    </header>

    <main class="detail-shell">
        <div id="postDetail"></div>
    </main>

    <script>
        const postId = {{ post_id }};

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
            })[char]);
        }

        function getConfidenceState(confidence) {
            if (confidence >= 0.9) {
                return { label: "안정", className: "confidence-stable" };
            }
            if (confidence >= 0.7) {
                return { label: "확인 필요", className: "confidence-review" };
            }
            return { label: "다시 보기", className: "confidence-retry" };
        }

        async function saveTitle(input, titleView, editPanel, editButton) {
            const title = input.value.trim();
            if (!title) {
                alert("제목을 입력해 주세요.");
                input.focus();
                return;
            }

            const res = await fetch(`/api/v1/posts/${postId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title }),
            });

            if (!res.ok) {
                alert("제목을 수정하지 못했습니다.");
                return;
            }

            const post = await res.json();
            titleView.innerText = post.title;
            input.value = post.title;
            editPanel.hidden = true;
            editButton.hidden = false;
        }

        async function deletePost() {
            if (!confirm("게시글을 삭제할까요?")) {
                return;
            }

            const res = await fetch(`/api/v1/posts/${postId}`, {
                method: "DELETE",
            });

            if (!res.ok) {
                alert("학습 기록을 삭제하지 못했습니다.");
                return;
            }

            location.href = "/board";
        }

        async function loadPost() {
            const res = await fetch(`/api/v1/posts/${postId}`);
            const postDetail = document.getElementById("postDetail");

            if (!res.ok) {
                postDetail.innerHTML = '<div class="empty-state">학습 기록을 찾을 수 없습니다.</div>';
                return;
            }

            const post = await res.json();
            postDetail.innerHTML = `
                <article class="detail-card card">
                    <img class="detail-image" src="${escapeHtml(post.image_url)}" alt="${escapeHtml(post.title)}">
                    <div class="detail-body">
                        <p class="eyebrow">Saved ASL Prediction</p>
                        <div class="detail-title-row">
                            <h1 id="postTitle">${escapeHtml(post.title)}</h1>
                            <div class="detail-actions">
                                <button id="editTitleBtn" class="secondary-btn" type="button">수정</button>
                                <button id="deletePostBtn" class="danger-btn" type="button">삭제</button>
                            </div>
                        </div>
                        <div id="titleEditPanel" class="detail-title-editor" hidden>
                            <input id="titleInput" class="title-input" value="${escapeHtml(post.title)}" aria-label="게시글 제목">
                            <button id="saveTitleBtn" type="button">저장</button>
                            <button id="cancelTitleBtn" class="secondary-btn" type="button">취소</button>
                        </div>
                        <div class="result-row">
                            <span>예측 알파벳</span>
                            <strong>${escapeHtml(post.prediction)}</strong>
                        </div>
                        <div class="result-row">
                            <span>신뢰도</span>
                            <strong>${(post.confidence * 100).toFixed(1)}%</strong>
                        </div>
                        <div class="result-row">
                            <span>판단 상태</span>
                            <strong class="confidence-badge ${getConfidenceState(post.confidence).className}">${getConfidenceState(post.confidence).label}</strong>
                        </div>
                        <div class="detail-link-row">
                            <a class="button-link secondary-link" href="/board?category=${encodeURIComponent(post.prediction)}">같은 알파벳 보기</a>
                            <a class="button-link" href="/classify">다시 분류하기</a>
                        </div>
                    </div>
                </article>
            `;

            const editButton = document.getElementById("editTitleBtn");
            const editPanel = document.getElementById("titleEditPanel");
            const input = document.getElementById("titleInput");
            const titleView = document.getElementById("postTitle");
            const deleteButton = document.getElementById("deletePostBtn");

            editButton.addEventListener("click", () => {
                editPanel.hidden = false;
                editButton.hidden = true;
                input.focus();
                input.select();
            });

            document.getElementById("cancelTitleBtn").addEventListener("click", () => {
                input.value = titleView.innerText;
                editPanel.hidden = true;
                editButton.hidden = false;
            });

            document.getElementById("saveTitleBtn").addEventListener("click", () => {
                saveTitle(input, titleView, editPanel, editButton);
            });

            deleteButton.addEventListener("click", deletePost);

            input.addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    event.preventDefault();
                    saveTitle(input, titleView, editPanel, editButton);
                }
            });
        }

        loadPost();
    </script>
</body>

</html>
