<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>게시글 상세</title>
</head>
<body>

<div id="postDetail"></div>

<script>
const postId=window.location.pathname.split("/").pop();

fetch(`/api/v1/posts/${postId}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("postDetail").innerHTML=`
<h1>${data.title}</h1>

<img src="${data.image_url}" width="400">

<p>${data.content}</p>

<p>
예측:
${data.prediction}
(${(data.confidence*100).toFixed(2)}%)
</p>
`;
});
</script>

</body>
</html>
